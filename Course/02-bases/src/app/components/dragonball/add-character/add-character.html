<div class="col-12 col-sm-6">
  <h3>Add: {{ name() }}</h3>

  <input
    type="text"
    class="form-control"
    placeholder="name"
    [value]="name()"
    (change)="name.set(txtName.value)"
    #txtName
  />

  <input
    type="number"
    class="form-control mt-2"
    placeholder="power"
    [value]="power()"
    (change)="power.set(+txtPower.value)"
    #txtPower
  />

  <button (click)="addCharacter()" class="mt-2 btn btn-primary">Add</button>
</div>
